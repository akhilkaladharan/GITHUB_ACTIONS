name: Build, Push & Deploy Docker Container
 
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub UI
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-username/your-repo
  CONTAINER_NAME: html-template-app
 
jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
 
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided by GitHub, no setup needed
 
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-          # Tag with commit SHA  e.g. sha-abc1234
            type=raw,value=latest         # Always tag as latest
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max
 
  # ─────────────────────────────────────────
  # JOB 2: Deploy Container on Remote Server
  # ─────────────────────────────────────────
  deploy:
    name: Deploy Container
    runs-on: ubuntu-latest
    needs: build-and-push   # Only runs after build-and-push succeeds
    permissions:
      packages: read
 
    steps:
      - name: Deploy via SSH to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }} 
          host: ${{ secrets.SERVER_HOST }}        # Your server IP or domain
          username: ${{ secrets.SERVER_USER }}    # SSH username (e.g. ubuntu, root)
          key: ${{ secrets.SERVER_SSH_KEY }}      # Private SSH key stored in GitHub Secrets
          script: |
            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
 
            # Pull the latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
 
            # Stop & remove old container if running
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm   ${{ env.CONTAINER_NAME }} || true
 
            # Run the new container
            # Port 80 on the server → port 80 in the container
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:80 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
 
            echo "✅ Container deployed successfully!"
 
            # Clean up old unused images
            docker image prune -f
 
