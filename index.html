<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My HTML Template</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f0f4f8;
        }
        .card {

            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);

        h1 { color: #2d3748; }
        p  { color: #718096; }

<body>
    <div class="card">
        <h1>🚀 Deployed via Docker + GitHub Actions</h1>
        <p>Your HTML template is live inside a container!</p>

</html>
